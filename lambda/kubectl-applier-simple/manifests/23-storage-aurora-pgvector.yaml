# Aurora pgvector ConfigMap — provides the database endpoint, port, secret
# ARN, region, and service account role ARN to pods via configMapKeyRef.
# Only applied when Aurora pgvector is enabled (cdk.json aurora_pgvector.enabled = true).
# The handler automatically skips this file when placeholders are unreplaced.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gco-aurora-pgvector
  namespace: gco-system
  labels:
    app: gco
    project: gco
data:
  endpoint: "{{AURORA_PGVECTOR_ENDPOINT}}"
  reader_endpoint: "{{AURORA_PGVECTOR_READER_ENDPOINT}}"
  port: "{{AURORA_PGVECTOR_PORT}}"
  secret_arn: "{{AURORA_PGVECTOR_SECRET_ARN}}"
  database: "gco_vectors"
  region: "{{REGION}}"
  role_arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gco-aurora-pgvector
  namespace: gco-jobs
  labels:
    app: gco
    project: gco
data:
  endpoint: "{{AURORA_PGVECTOR_ENDPOINT}}"
  reader_endpoint: "{{AURORA_PGVECTOR_READER_ENDPOINT}}"
  port: "{{AURORA_PGVECTOR_PORT}}"
  secret_arn: "{{AURORA_PGVECTOR_SECRET_ARN}}"
  database: "gco_vectors"
  region: "{{REGION}}"
  role_arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gco-aurora-pgvector
  namespace: gco-inference
  labels:
    app: gco
    project: gco
data:
  endpoint: "{{AURORA_PGVECTOR_ENDPOINT}}"
  reader_endpoint: "{{AURORA_PGVECTOR_READER_ENDPOINT}}"
  port: "{{AURORA_PGVECTOR_PORT}}"
  secret_arn: "{{AURORA_PGVECTOR_SECRET_ARN}}"
  database: "gco_vectors"
  region: "{{REGION}}"
  role_arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
